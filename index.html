<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON GYM Booking</title>

<style>
:root{
--gold:#f5c16c;
--gold2:#e67e22;
--glass:rgba(20,20,20,.78);
--green:#25d366;
--red:#e74c3c;
}

*{box-sizing:border-box;font-family:Segoe UI}
body{
margin:0;min-height:100vh;color:#fff;
background:
radial-gradient(circle at 20% 10%,#f5c16c33,transparent 40%),
radial-gradient(circle at 80% 30%,#e67e2244,transparent 45%),
linear-gradient(180deg,#000,#050505);
animation:bgMove 30s linear infinite;
}
@keyframes bgMove{
0%{background-position:0 0,0 0,0 0}
100%{background-position:1000px 700px,-1000px -700px,0 0}
}

/* LOADER */
#loader{
position:fixed;inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:10000;
}
.loader-ring{
width:90px;height:90px;
border-radius:50%;
border:6px solid rgba(255,255,255,.1);
border-top:6px solid var(--gold);
animation:spin 1.2s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* GLOBAL */
button,.option{transition:.25s cubic-bezier(.4,0,.2,1)}
button:hover{transform:translateY(-3px)}
button:active{transform:scale(.9)}

.refresh-btn{
position:fixed;top:16px;right:16px;
padding:12px 18px;border-radius:999px;
border:none;font-weight:900;
background:linear-gradient(135deg,var(--gold),var(--gold2));
z-index:50;
}

/* LAYOUT */
.container{max-width:480px;margin:auto;padding:24px}
.card{
background:var(--glass);
backdrop-filter:blur(18px);
border-radius:34px;
padding:28px;
border:1px solid rgba(255,255,255,.1);
box-shadow:0 60px 160px rgba(0,0,0,.9);
animation:float 6s ease-in-out infinite;
}
@keyframes float{50%{transform:translateY(-6px)}}

/* HEADER */
.header{text-align:center;cursor:pointer}
.gym-logo{
width:95px;
margin-bottom:12px;
filter:drop-shadow(0 0 18px rgba(245,193,108,.9));
animation:logoSpin 12s linear infinite;
transition:0.4s;
}

/* animasi putar */
@keyframes logoSpin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* efek hover */
.gym-logo:hover{
animation-play-state:paused;
transform:scale(1.1);
filter:drop-shadow(0 0 25px rgba(245,193,108,1));
}
.header h1{
margin:0;font-size:38px;
background:linear-gradient(135deg,var(--gold),var(--gold2));
-webkit-background-clip:text;color:transparent;
text-shadow:0 0 30px rgba(245,193,108,.8);
}

/* INPUT */
input{
width:100%;padding:16px;border-radius:18px;border:none;
background:#ffffff14;color:#fff;margin-bottom:14px;
}

/* OPTION */
.option-title{margin:12px 0 6px;opacity:.7}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.option{
padding:14px;border-radius:18px;
background:#111;border:1px solid #222;text-align:center;
}
.option.active{
background:linear-gradient(135deg,var(--gold),var(--gold2));
color:#000;font-weight:900;
transform:scale(1.08);
box-shadow:0 0 30px rgba(245,193,108,.9);
}

/* BUTTON */
.main-btn{
width:100%;padding:18px;border:none;
border-radius:999px;font-weight:900;
background:linear-gradient(135deg,var(--gold),var(--gold2));
margin-top:14px;
}

/* PRICE */
.price{text-align:center;display:none;margin-top:16px}
.price strong{font-size:28px;color:var(--gold)}

/* QRIS */
.qris{display:none;text-align:center;margin-top:20px;animation:qrisIn .6s ease}
@keyframes qrisIn{from{opacity:0;transform:scale(.6)}to{opacity:1}}
.qris img{
width:230px;background:#fff;padding:14px;border-radius:22px;
animation:pulse 2s infinite;
}
@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(245,193,108,.7)}
70%{box-shadow:0 0 0 25px rgba(245,193,108,0)}
100%{box-shadow:0 0 0 0 rgba(245,193,108,0)}
}

/* POPUP */
.popup{
position:fixed;inset:0;background:rgba(0,0,0,.7);
display:none;align-items:center;justify-content:center;z-index:9999;
}
.popup-box{background:#111;padding:26px;border-radius:26px}
.popup-box.success{
border:2px solid var(--gold);
}

.popup-box.error{
border:2px solid var(--red);
box-shadow:0 0 40px rgba(231,76,60,.6);
}


/* ADMIN */
.admin{
position:fixed;inset:0;background:#000;
display:none;z-index:9000;
animation:adminIn .5s ease;
}
@keyframes adminIn{
from{opacity:0;transform:translateY(40px)}
to{opacity:1}
}
.admin-box{
max-width:520px;
margin:20px auto;
background:#0c0c0c;
padding:26px;
border-radius:26px;
max-height:90vh;
overflow-y:auto;
}
.admin-box h3{
cursor:pointer;
}
.admin-box h3:active{transform:scale(.95)}

.item{
background:#111;padding:14px;border-radius:16px;margin-top:10px
}
.item button{
margin-top:6px;background:var(--red);
border:none;padding:6px 14px;border-radius:14px;color:#fff
}

/* SEARCH */
.admin-search{
width:100%;
padding:14px;
border-radius:16px;
border:none;
background:#ffffff14;
color:#fff;
margin:10px 0;
}

/* CLICK RIPPLE */
.click-ripple{
position:fixed;width:18px;height:18px;border-radius:50%;
background:radial-gradient(circle,
rgba(245,193,108,.9) 0%,
rgba(245,193,108,.5) 35%,
transparent 70%);
transform:translate(-50%,-50%) scale(0);
animation:ripple .6s ease-out;
pointer-events:none;z-index:99999;
}
@keyframes ripple{
to{transform:translate(-50%,-50%) scale(6);opacity:0}
}
#bookingWidget{
position:fixed;
bottom:20px;
left:20px;
background:#111;
padding:16px;
border-radius:16px;
box-shadow:0 0 25px rgba(0,0,0,.6);
z-index:9999;
display:none;
width:220px;
}

#bookingWidget button{
width:100%;
margin-top:10px;
background:#e74c3c;
border:none;
padding:10px;
border-radius:10px;
color:#fff;
font-weight:bold;
}
#bookingTimer{
margin-top:8px;
font-size:14px;
color:#f5c16c;
font-weight:bold;
}
#bookingWidget{
position:fixed;
left:20px;
bottom:20px;
width:230px;
background:#0f172a;
color:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
overflow:hidden;
display:none;
animation:slideUp .5s ease;
font-size:14px;
}

#bookingHeader{
background:#1e293b;
padding:10px;
font-weight:bold;
text-align:center;
}

#bookingContent{
padding:12px;
}

#bookingCountdown{
margin-top:8px;
font-size:16px;
color:#facc15;
font-weight:bold;
}

#bookingProgress{
height:6px;
background:#1e293b;
border-radius:5px;
margin-top:10px;
overflow:hidden;
}

#bookingBar{
height:100%;
width:0%;
background:#22c55e;
transition:width 1s linear;
}

#cancelBtn{
margin-top:10px;
width:100%;
padding:6px;
border:none;
background:#ef4444;
color:white;
border-radius:6px;
cursor:pointer;
}

@keyframes slideUp{
from{
transform:translateY(40px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}
#bookingHeader{
background:#1e293b;
padding:10px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
cursor:grab;
user-select:none;
}

#bookingHeader:active{
cursor:grabbing;
}

#minBtn{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

#bookingWidget.minimized #bookingContent{
display:none;
}

#bookingWidget.minimized{
width:60px;
height:60px;
border-radius:50%;
padding:0;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#bookingWidget.minimized #bookingContent{
display:none;
}

#bookingWidget.minimized #bookingHeader{
background:none;
font-size:22px;
justify-content:center;
}

#bookingWidget.minimized #minBtn{
display:none;
}
</style>
</head>

<body>

<div id="loader"><div class="loader-ring"></div></div>
<button class="refresh-btn" onclick="location.reload()">🔄 Refresh</button>

<div class="container">
<div class="card" id="card">
<div class="header" id="title">

<img src="assets/img/logo.png" class="gym-logo">

<h1>IRON GYM</h1>

</div>

<input id="nama" placeholder="Nama">
<input id="hp" placeholder="Nomor WhatsApp">

<div class="option-title">Pilih Kelas</div>
<div class="grid" id="kelas"></div>

<div class="option-title">Pilih ZIN</div>
<div class="grid" id="zin"></div>

<div class="option-title">Pilih Tanggal</div>
<input type="date" id="tanggal">

<div class="option-title">Pilih Jam</div>
<input type="time" id="jam">

<div class="price" id="priceBox">Total<br><strong id="harga"></strong></div>
<button class="main-btn" onclick="bayar()">BAYAR</button>

<div class="qris" id="qrisBox">
<img src="assets/img/QRIS.jpeg">
<button class="main-btn" onclick="downloadQRIS()">DOWNLOAD QRIS</button>
<div class="countdown" id="countdown"></div>
</div>

<button class="main-btn" style="background:linear-gradient(135deg,#25d366,#128c7e)" onclick="kirimWA()">KIRIM VIA WHATSAPP</button>
</div>
</div>

<div class="admin" id="admin">
<div class="admin-box">
<h3>ADMIN PANEL</h3>

<input class="admin-search" id="searchBooking" placeholder="Cari booking...">
<input id="zinNama" placeholder="Nama ZIN">
<input id="zinHarga" type="number" placeholder="Harga">
<input id="zinImg" type="file" accept="image/*">
<button class="main-btn" onclick="tambahZin()">Tambah ZIN</button>

<h4>ZIN</h4>
<div id="listZin"></div>

<h4>Booking</h4>
<div id="listBooking"></div>

<button class="main-btn" onclick="admin.style.display='none'">⬅ Kembali ke Halaman Utama</button>
</div>
</div>

<script>
window.addEventListener("load", () => {

document.getElementById("loader").style.display="none";

loadBooking();

});

/* CLICK RIPPLE */
document.addEventListener("click",e=>{
if(e.target.tagName==="INPUT")return;
let r=document.createElement("div");
r.className="click-ripple";
r.style.left=e.clientX+"px";
r.style.top=e.clientY+"px";
document.body.appendChild(r);
setTimeout(()=>r.remove(),600);
});

/* DATA */
const WA_ADMIN="6282337354131",PIN="123";
let kelasData=["Zumba","Aerobic","RX","TRX"];
let zinData = JSON.parse(localStorage.getItem("zin")) || [
  {name:"Ayu", harga:100000, img:"assets/img/ayu.jpg"},
  {name:"Aim", harga:200000, img:"assets/img/aim.jpg"}
];
let bookings=JSON.parse(localStorage.getItem("book"))||[];
let pilihKelas="",pilihZin=null;

kelasData.forEach(k=>{
let d=document.createElement("div");
d.className="option";d.textContent=k;
d.onclick=()=>{pilihKelas=k;setActive(d,"#kelas")};
kelas.appendChild(d);
});
function renderZin(){
  zin.innerHTML = "";
  zinData.forEach(z => {
    let d = document.createElement("div");
    d.className = "option";
    d.innerHTML = `
      <div style="font-weight:bold;margin-bottom:6px">${z.name}</div>
      <img src="${z.img || 'assets/img/default.jpg'}" style="width:100%;border-radius:12px;margin-bottom:6px">
      <!-- Harga disembunyikan, muncul saat klik BAYAR -->
    `;
    d.onclick = () => { pilihZin = z; setActive(d, "#zin") };
    zin.appendChild(d);
  });
}

/* TARUH FUNGSI FIREBASE DI SINI */
async function loadZinFirebase(){

const querySnapshot = await getDocs(collection(db,"zins"));

zinData=[];

querySnapshot.forEach((doc)=>{

console.log("DATA ZIN:",doc.data());

zinData.push(doc.data());

});

renderZin();
renderAdmin();

}
document.addEventListener("DOMContentLoaded", () => {

loadBooking();
loadZinFirebase();

});

function setActive(el,par){
document.querySelectorAll(par+" .option").forEach(o=>o.classList.remove("active"));
el.classList.add("active");
}

function bayar(){

if(!nama.value || !hp.value || !pilihKelas || !pilihZin || !tanggal.value || !jam.value){
showPopup("⚠️ Silahkan Isi Semua data Bookingnya!","error");
return;
}

// tampilkan popup metode pembayaran
document.getElementById("paymentPopup").style.display="flex";

}
function downloadQRIS(){
let a=document.createElement("a");
a.href="assets/img/QRIS.jpeg";
a.download="QRIS-IRON-GYM.png";
a.click();
}
function kirimWA(){

if(!nama.value || !hp.value || !pilihKelas || !pilihZin || !tanggal.value || !jam.value){
showPopup("⚠️ Lengkapi data booking dulu sebelum kirim WhatsApp","error");
return;
}

let msg =
`📌 BOOKING IRON GYM%0A
--------------------%0A
Nama : ${nama.value}%0A
WhatsApp : ${hp.value}%0A
Kelas : ${pilihKelas}%0A
ZIN : ${pilihZin.name}%0A
Harga : Rp ${pilihZin.harga.toLocaleString()}%0A
Tanggal : ${tanggal.value}%0A
Jam : ${jam.value}%0A
--------------------%0A
💳 QRIS:%0A
${location.origin}/assets/img/QRIS.jpeg%0A
--------------------%0A
📸 Bukti transfer menyusul`;

window.open(`https://wa.me/${WA_ADMIN}?text=${msg}`);
}



/* ADMIN */
let tap=0;
title.onclick=()=>{
tap++;
if(tap>=5 && prompt("PIN Admin")==PIN){
admin.style.display="block";
renderAdmin();
tap=0;
}
}
searchBooking.oninput=()=>renderAdmin(searchBooking.value);

function renderAdmin(q=""){
listZin.innerHTML = "";
zinData.forEach((z,i) => listZin.innerHTML += `
  <div class="item">
    <img src="${z.img || 'assets/img/default.jpg'}" style="width:50px;height:50px;border-radius:8px;margin-right:8px;vertical-align:middle">
    ${z.name} 
    <button onclick="openEditZin(${i})" style="background:#118eea;margin-left:6px;">Edit</button>
    <button onclick="hapusZin(${i})">Hapus</button>
  </div>
`);

listBooking.innerHTML="";
bookings.filter(b=>
`${b.nama} ${b.kelas} ${b.zin}`.toLowerCase().includes(q.toLowerCase())
).forEach((b,i)=>listBooking.innerHTML+=`
<div class="item">
<b>${b.nama}</b><br>${b.kelas} • ${b.zin}<br>
${b.tanggal} ${b.jam}<br>
Rp ${b.harga.toLocaleString()}
<button onclick="hapusBooking(${i})">Hapus</button>
</div>`);
}
async function tambahZin(){

let file = document.getElementById("zinImg").files[0];

if(!zinNama.value || !zinHarga.value || !file){
alert("Isi nama, harga, dan pilih gambar ZIN!");
return;
}

let reader = new FileReader();

reader.onload = async function(e){

let dataZin={
name:zinNama.value,
harga:+zinHarga.value,
img:e.target.result
};

// simpan ke Firebase
await addDoc(collection(db,"zins"),dataZin);

// reload data zin
loadZinFirebase();

zinNama.value="";
zinHarga.value="";
document.getElementById("zinImg").value="";

showPopup("ZIN berhasil ditambahkan","success");

}

reader.readAsDataURL(file);

}

function hapusZin(i){
zinData.splice(i,1);
localStorage.setItem("zin",JSON.stringify(zinData));
renderZin();renderAdmin();
}
function hapusBooking(i){
bookings.splice(i,1);
localStorage.setItem("book",JSON.stringify(bookings));
renderAdmin();
}
function showPopup(text,type="success"){

let box=document.querySelector("#popup .popup-box");
let pop=document.getElementById("popup");

box.classList.remove("success","error");

if(type==="success"){
popupTitle.innerText="✅ Booking Berhasil";
box.classList.add("success");
}else{
popupTitle.innerText="⚠️ Data Belum Lengkap";
box.classList.add("error");
}

popupText.innerText=text;

pop.style.display="flex";

}
function closePopup(){
document.getElementById("popup").style.display="none";
}
async function bayarQRIS(){

paymentPopup.style.display="none";

document.getElementById("qrisBox").style.display="block";

let dataBooking={
nama:nama.value,
hp:hp.value,
kelas:pilihKelas,
zin:pilihZin.name,
harga:pilihZin.harga,
tanggal:tanggal.value,
jam:jam.value
};

// simpan ke Firebase
await simpanBookingFirebase(dataBooking);

// simpan booking lokal
bookings.push(dataBooking);
localStorage.setItem("book",JSON.stringify(bookings));

// simpan booking aktif untuk countdown
localStorage.setItem("activeBooking", JSON.stringify(dataBooking));

// jalankan widget countdown
loadBooking();

showPopup("Silakan scan QRIS untuk pembayaran","success");

}
async function bayarDANA(){

paymentPopup.style.display="none";

let dataBooking={
nama:nama.value,
hp:hp.value,
kelas:pilihKelas,
zin:pilihZin.name,
harga:pilihZin.harga,
tanggal:tanggal.value,
jam:jam.value
};

await simpanBookingFirebase(dataBooking);

bookings.push(dataBooking);
localStorage.setItem("book",JSON.stringify(bookings));

// simpan booking aktif
localStorage.setItem("activeBooking", JSON.stringify(dataBooking));

// jalankan countdown
loadBooking();

navigator.clipboard.writeText("085157539577");

showPopup("Transfer ke DANA:\n085157539577\nNomor disalin 👍","success");

}
function loadBooking(){

let data = JSON.parse(localStorage.getItem("activeBooking"));

let widget = document.getElementById("bookingWidget");

if(!data){
widget.style.display="none";
return;
}

widget.style.display="block";

document.getElementById("bookingInfo").innerHTML =
"ZIN : "+data.zin+"<br>"+
"Tanggal : "+data.tanggal+"<br>"+
"Jam : "+data.jam;

startCountdown(data.tanggal,data.jam);

}

let countdownTimer=null;

function startCountdown(tanggal,jam){

if(countdownTimer){
clearInterval(countdownTimer);
}

let data = JSON.parse(localStorage.getItem("activeBooking"));

let target=new Date(tanggal+"T"+jam).getTime();

let startTime=new Date().getTime();
let total=target-startTime;

let notified=false;

countdownTimer=setInterval(()=>{

let now=new Date().getTime();
let distance=target-now;

if(distance<=3600000 && !notified){

kirimNotifikasi(data.zin,data.jam);
notified=true;

}

if(distance<=0){

clearInterval(countdownTimer);

document.getElementById("bookingCountdown").innerHTML="Kelas Dimulai";

return;

}

let hours=Math.floor(distance/(1000*60*60));
let minutes=Math.floor((distance%(1000*60*60))/(1000*60));
let seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("bookingCountdown").innerHTML=
hours+"h "+minutes+"m "+seconds+"s";

/* UPDATE PROGRESS BAR */

let percent=100-(distance/total*100);
document.getElementById("bookingBar").style.width=percent+"%";

/* UPDATE BUBBLE RING */

updateBubbleRing(percent);

},1000);

}
function batalkanBooking(){

if(!confirm("Batalkan booking?")) return;

localStorage.removeItem("activeBooking");

document.getElementById("bookingWidget").style.display="none";

showPopup("Booking berhasil dibatalkan","success");

}

/* LOAD BOOKING SAAT WEBSITE DIBUKA */
window.addEventListener("load", loadBooking);
function closePayment(){
document.getElementById("paymentPopup").style.display="none";
}
if ("Notification" in window) {
if (Notification.permission !== "granted") {
Notification.requestPermission();
}
}
function kirimNotifikasi(zin,jam){

if(Notification.permission==="granted"){

new Notification("⏰ Kelas Segera Dimulai!",{
body:"Kelas dengan Zin "+zin+" dimulai jam "+jam+" (1 jam lagi)"
});

}

playAlarm();

}
function playAlarm(){

let audio=document.getElementById("alarmSound");

audio.play();

if(navigator.vibrate){
navigator.vibrate([300,200,300,200,500]);
}

}
function editZin(i){
  let z = zinData[i];
  let newName = prompt("Nama ZIN:", z.name);
  if(!newName) return;

  let newHarga = prompt("Harga ZIN:", z.harga);
  if(!newHarga || isNaN(newHarga)) return;

  // pilih foto baru opsional
  let newFile = document.getElementById("zinImg").files[0];
  if(newFile){
    let reader = new FileReader();
    reader.onload = function(e){
      zinData[i] = { name: newName, harga: +newHarga, img: e.target.result };
      localStorage.setItem("zin", JSON.stringify(zinData));
      renderZin();
      renderAdmin();
      document.getElementById("zinImg").value = "";
    }
    reader.readAsDataURL(newFile);
  } else {
    zinData[i] = { name: newName, harga: +newHarga, img: z.img };
    localStorage.setItem("zin", JSON.stringify(zinData));
    renderZin();
    renderAdmin();
  }
}
let currentEditIndex = null;

function openEditZin(i){
  currentEditIndex = i;
  document.getElementById("editZinTitle").innerText = `ZIN: ${zinData[i].name}`;
  document.getElementById("editZinPopup").style.display = "flex";
}

function closeEditZin(){
  document.getElementById("editZinPopup").style.display = "none";
  document.getElementById("zinImgInput").value = "";
}

function editZinField(field){
  if(currentEditIndex === null) return;
  let z = zinData[currentEditIndex];

  if(field === "name"){
    let newName = prompt("Nama ZIN:", z.name);
    if(!newName) return;
    z.name = newName;
  } else if(field === "harga"){
    let newHarga = prompt("Harga ZIN:", z.harga);
    if(!newHarga || isNaN(newHarga)) return;
    z.harga = +newHarga;
  } else if(field === "img"){
    // trigger file input
    let fileInput = document.getElementById("zinImgInput");
    fileInput.click();
    fileInput.onchange = function(){
      let file = fileInput.files[0];
      if(!file) return;
      let reader = new FileReader();
      reader.onload = function(e){
        z.img = e.target.result;
        localStorage.setItem("zin", JSON.stringify(zinData));
        renderZin();
        renderAdmin();
        closeEditZin();
      }
      reader.readAsDataURL(file);
    }
    return; // stop here, wait file input
  }

  // update data & UI
  zinData[currentEditIndex] = z;
  localStorage.setItem("zin", JSON.stringify(zinData));
  renderZin();
  renderAdmin();
  closeEditZin();
}

/* DRAG BOOKING WIDGET */

document.addEventListener("DOMContentLoaded",()=>{

const widget = document.getElementById("bookingWidget");
const header = document.getElementById("bookingHeader");
const minBtn = document.getElementById("minBtn");

let offsetX = 0;
let offsetY = 0;
let isDragging = false;

function startDrag(x,y){
isDragging = true;

const rect = widget.getBoundingClientRect();

offsetX = x - rect.left;
offsetY = y - rect.top;
}

function moveDrag(x,y){
if(!isDragging) return;

let left = x - offsetX;
let top = y - offsetY;

widget.style.left = left + "px";
widget.style.top = top + "px";
widget.style.bottom = "auto";

localStorage.setItem("widgetX",left);
localStorage.setItem("widgetY",top);
}

function endDrag(){
isDragging=false;
}

/* MOUSE DRAG */
header.addEventListener("mousedown",e=>{
startDrag(e.clientX,e.clientY);
});

document.addEventListener("mousemove",e=>{
moveDrag(e.clientX,e.clientY);
});

document.addEventListener("mouseup",endDrag);

/* TOUCH DRAG (HP) */

header.addEventListener("touchstart",e=>{
let t=e.touches[0];
startDrag(t.clientX,t.clientY);
});

document.addEventListener("touchmove",e=>{
let t=e.touches[0];
moveDrag(t.clientX,t.clientY);
});

document.addEventListener("touchend",endDrag);

/* RESTORE JIKA BUBBLE DIKLIK */

header.addEventListener("click",function(){

if(widget.classList.contains("minimized")){
widget.classList.remove("minimized");
localStorage.setItem("widgetMin","false");
}

});

/* MINIMIZE BUTTON */

minBtn.onclick=(e)=>{

e.stopPropagation(); // supaya tidak trigger header click

widget.classList.toggle("minimized");

localStorage.setItem(
"widgetMin",
widget.classList.contains("minimized")
);

};

/* LOAD POSISI */

let x=localStorage.getItem("widgetX");
let y=localStorage.getItem("widgetY");

if(x && y){
widget.style.left=x+"px";
widget.style.top=y+"px";
widget.style.bottom="auto";
}

/* LOAD MINIMIZE */

if(localStorage.getItem("widgetMin")==="true"){
widget.classList.add("minimized");
}

});

</script>
